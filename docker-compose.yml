version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: context_scaffold_pg
    environment:
      POSTGRES_USER: scaffold_user
      POSTGRES_PASSWORD: scaffold_pass
      POSTGRES_DB: context_scaffold
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./app/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scaffold_user -d context_scaffold"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: context_scaffold_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  redis_data: